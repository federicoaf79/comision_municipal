<style>
:root{
  --navy:#0F1C35;--navy2:#1B2B4B;--gold:#C9A84C;--gold2:#E8C96A;
  --bg:#F5F4EF;--bg2:#ECEAE0;--white:#fff;--muted:#6B7080;
  --bdr:#DDE0EC;--ok:#16803A;--ok-bg:#EBFAF2;--warn:#92600A;
  --warn-bg:#FEF8EC;--err:#9B1C1C;--err-bg:#FEF2F2;
  --inf:#1E40AF;--inf-bg:#EFF6FF;--cc:#7C3AED;--cc-bg:#F5F3FF;
  --salud:#0E7490;--salud-bg:#ECFEFF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:#1A1A2E;font-size:13px;height:100vh;overflow:hidden}
button,input,select,textarea{font-family:'Sora',sans-serif}
.sidebar{width:220px;background:var(--navy);height:100vh;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.logo-sq{width:34px;height:34px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace}
.logo-txt{font-size:14px;font-weight:700;color:#fff;letter-spacing:.02em}
.logo-sub{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.06em;text-transform:uppercase}
.nav-section{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:14px 16px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;border-radius:0;font-size:12px;color:rgba(255,255,255,.6);transition:all .12s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.9)}
.nav-item.active{background:rgba(201,168,76,.12);color:var(--gold2);border-left-color:var(--gold)}
.nav-ico{font-size:15px;width:20px;text-align:center}
.badge-pill{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--gold);color:var(--navy);margin-left:auto}
.sidebar-footer{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:rgba(255,255,255,.3)}
.sidebar-footer strong{color:rgba(255,255,255,.6);display:block;font-size:11px;margin-bottom:2px}
.topbar{height:52px;background:var(--white);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;color:var(--navy)}
.topbar-sub{font-size:11px;color:var(--muted)}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em}
.tok{background:var(--ok-bg);color:var(--ok)}
.twarn{background:var(--warn-bg);color:var(--warn)}
.terr{background:var(--err-bg);color:var(--err)}
.tinf{background:var(--inf-bg);color:var(--inf)}
.tcc{background:var(--cc-bg);color:var(--cc)}
.tgold{background:#FDF6E3;color:#7A5C10}
.tsalud{background:var(--salud-bg);color:var(--salud)}
.tnavy{background:#EBF0F8;color:var(--navy2)}
.card{background:var(--white);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px}
.kpi-val{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1}
.kpi-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:2px}
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:var(--bg2);border-bottom:1px solid var(--bdr)}
td{padding:9px 12px;border-bottom:1px solid var(--bdr);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable:hover td{background:#F8F8F5;cursor:pointer}
.btn-pri{padding:8px 16px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer}
.btn-sec{padding:8px 16px;background:var(--white);color:var(--navy);border:1px solid var(--bdr);border-radius:7px;font-size:11px;cursor:pointer}
.btn-gold{padding:8px 16px;background:var(--gold);color:var(--navy);border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:5px}
.inp{padding:7px 10px;border:1px solid var(--bdr);border-radius:7px;font-size:12px;color:var(--navy);background:var(--white);width:100%}
.tab-bar{display:flex;gap:4px;border-bottom:2px solid var(--bdr);margin-bottom:16px}
.tab-btn{padding:8px 14px;font-size:11px;font-weight:600;background:none;border:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy)}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.section-hd{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bdr)}
.doc-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--bdr);border-radius:8px;margin-bottom:6px;background:var(--white)}
.upload-zone{border:2px dashed var(--bdr);border-radius:10px;padding:24px;text-align:center;background:var(--bg2);cursor:pointer}
.dep-card{border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;background:var(--white);cursor:pointer;transition:all .12s}
.dep-card:hover{border-color:var(--navy);transform:translateY(-1px)}
.dep-card.active-dep{border-color:var(--gold);background:var(--gold-pale,#FDF6E3)}
.layer-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
input[type=search]{background-image:none}
</style>
</head>

// ── COMPONENTS ──
function Avatar({nom,color}){
  const initials = nom.split(',')[0].trim().split(' ').slice(0,2).map(w=>w[0]).join('');
  return e('div',{className:'avatar',style:{background:color+'22',color}},[initials]);
}

function StatCard({val,lbl,sub,color}){
  return e('div',{className:'card',style:{borderTop:`3px solid ${color}`}},
    e('div',{className:'kpi-val',style:{color}},val),
    e('div',{className:'kpi-lbl'},lbl),
    sub && e('div',{className:'kpi-sub'},sub)
  );
}

function PageCRM({onVecino}){
  const [q,setQ]=useState('');
  const [filtBar,setFiltBar]=useState('todos');
  const barrios=['todos',...new Set(vecinos.map(v=>v.barrio))];
  const fil=vecinos.filter(v=>{
    const mq=v.nom.toLowerCase().includes(q.toLowerCase())||v.dni.includes(q);
    const mb=filtBar==='todos'||v.barrio===filtBar;
    return mq&&mb;
  });
  return e('div',null,
    e('div',{style:{display:'flex',gap:10,marginBottom:16,alignItems:'center'}},
      e('input',{className:'inp',placeholder:'Buscar por nombre o DNI...',value:q,onChange:ev=>setQ(ev.target.value),style:{flex:1}}),
      e('select',{className:'inp',value:filtBar,onChange:ev=>setFiltBar(ev.target.value),style:{width:160}},
        barrios.map(b=>e('option',{key:b,value:b},b==='todos'?'Todos los barrios':b))
      ),
      e('button',{className:'btn-gold btn-sm',style:{padding:'8px 14px',whiteSpace:'nowrap',fontSize:11}},'+ Nuevo vecino')
    ),
    e('div',{className:'card',style:{padding:0,overflow:'hidden'}},
      e('table',null,
        e('thead',null,e('tr',null,['Vecino','DNI','Barrio','Tel.','Turnos','Denuncias','H.Clínico',''].map(h=>e('th',{key:h},h)))),

          e('td',null,e('div',{style:{display:'flex',alignItems:'center',gap:8}},
            e(Avatar,{nom:v.nom,color:'#1B2B4B'}),
            e('div',null,
              e('div',{style:{fontWeight:600,fontSize:12}},v.nom),
              e('div',{style:{fontSize:10,color:'var(--muted)'}},`Capa ${v.layer}`)
            )
          )),
          e('td',{style:{fontFamily:'DM Mono,monospace',fontSize:11}},v.dni),
          e('td',{style:{color:'var(--muted)'}},v.barrio),
          e('td',{style:{fontSize:11}},v.tel),
          e('td',{style:{textAlign:'center',fontWeight:600}},v.turnosCount),
          e('td',{style:{textAlign:'center'}},
            e('span',{style:{fontWeight:600,color:v.denCount>1?'var(--err)':v.denCount>0?'var(--warn)':'var(--muted)'}},v.denCount)

        page==='dashboard'&&e(PageDashboard,null),
        page==='crm'&&!vecinoSel&&e(PageCRM,{onVecino:v=>{setVecinoSel(v)}}),
        page==='crm'&&vecinoSel&&e(PageVecino,{vecino:vecinoSel,onBack:()=>setVecinoSel(null)}),
        page==='salud'&&e(PageSalud,null),
        page==='dependencias'&&e(PageDependencias,null),
        page==='sms'&&e(PageSMS,null)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
